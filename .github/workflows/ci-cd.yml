build-and-push-image:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v2
      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      # 백엔드 빌드 및 푸시
      - name: Build and Push Backend
        run: |
          docker build --platform linux/amd64 -t ${{ secrets.DOCKER_USERNAME }}/community-be:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/community-be:latest
          
      # 프론트엔드 빌드 및 푸시
      - name: Build and Push Frontend
        run: |
          docker build --platform linux/amd64 -t ${{ secrets.DOCKER_USERNAME }}/community-fe:latest ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/community-fe:latest